[env:adafruit_feather_m4]
platform = atmelsam
board = adafruit_feather_m4
framework = arduino
lib_deps = 
	adafruit/RTClib@^2.1.1
	adafruit/Adafruit Protomatter@^1.5.7
	WiFiNINA=https://github.com/adafruit/WiFiNINA/archive/master.zip 
